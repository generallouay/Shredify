name: shredify
description: "Track your nutrition macros with style."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.3
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  image_picker: ^1.1.2
  archive: ^3.6.1
  intl: ^0.19.0
  shared_preferences: ^2.3.4
  file_picker: ^8.0.0
  package_info_plus: ^8.1.3
  url_launcher: ^6.3.1
  flutter_markdown: ^0.7.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
