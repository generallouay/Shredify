name: shredify
description: "Track your nutrition macros with style."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.3
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  image_picker: ^1.1.2
  archive: ^3.6.1
  intl: ^0.19.0
  shared_preferences: ^2.3.4
  file_picker: ^8.0.0
  package_info_plus: ^8.1.3
  url_launcher: ^6.3.1
  flutter_markdown: ^0.7.6
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6
  google_sign_in: ^6.2.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "Icon/diet.png"
  adaptive_icon_background: "#0F0F0F"
  adaptive_icon_foreground: "Icon/diet_foreground.png"
  min_sdk_android: 21
